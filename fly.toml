app = "tech-day"
primary_region = "cdg"

[build]
dockerfile = "Dockerfile"

[deploy]
release_command = "python manage.py migrate"

[env]
DJANGO_SETTINGS_MODULE = "techday.settings"

[experimental]
auto_rollback = true

  [experimental.attached]
  secrets = { }

[[services]]
internal_port = 8_000
processes = [ "app" ]
protocol = "tcp"

  [services.concurrency]
  hard_limit = 25
  soft_limit = 20
  type = "requests"

  [[services.ports]]
  handlers = [ "http" ]
  port = 80

  [[services.ports]]
  handlers = [ "tls", "http" ]
  port = 443

  [[services.tcp_checks]]
  grace_period = "1m0s"
  interval = "15s"
  timeout = "2s"
