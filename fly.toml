app = "techday-app"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[env]
  DJANGO_SETTINGS_MODULE = "techday.settings"

[deploy]
  release_command = "python manage.py migrate"

[experimental]
  auto_rollback = true

[[services]]
  processes = ["app"]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "1m0s"

