{% extends "base.html" %}

{% block title %}تغيير كلمة المرور - Tech Day{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-slate-900/80 border border-slate-800 rounded-2xl p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-2 text-center">تغيير كلمة المرور</h1>
        <p class="text-sm text-slate-400 mb-6 text-center">
            يمكنك من هنا تحديث كلمة المرور الخاصة بحسابك في النظام.
        </p>
        {% if error %}
        <div class="mb-4 rounded-xl border border-rose-700/70 bg-rose-500/10 px-3 py-2 text-xs text-rose-100">
            {{ error }}
        </div>
        {% endif %}
        {% if success %}
        <div class="mb-4 rounded-xl border border-emerald-500/60 bg-emerald-500/10 px-3 py-2 text-xs text-emerald-100">
            {{ success }}
        </div>
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm mb-1" for="old_password">كلمة المرور الحالية</label>
                <input id="old_password" name="old_password" type="password" required
                       class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <div>
                <label class="block text-sm mb-1" for="new_password1">كلمة المرور الجديدة</label>
                <input id="new_password1" name="new_password1" type="password" required
                       class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <div>
                <label class="block text-sm mb-1" for="new_password2">تأكيد كلمة المرور الجديدة</label>
                <input id="new_password2" name="new_password2" type="password" required
                       class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <button type="submit"
                    class="w-full mt-4 inline-flex items-center justify-center rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold py-2.5 text-sm transition">
                حفظ كلمة المرور الجديدة
            </button>
        </form>
    </div>
</div>
{% endblock %}
