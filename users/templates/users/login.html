{% extends "base.html" %}

{% block title %}تسجيل الدخول - Tech Day{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-slate-950/80 border border-slate-800/80 rounded-2xl p-6 shadow-[0_18px_45px_rgba(15,23,42,0.9)] space-y-5">
        <div class="space-y-2 text-center">
            <div class="inline-flex items-center gap-2 rounded-full border border-cyan-500/40 bg-cyan-500/10 px-3 py-1 text-[11px] font-medium text-cyan-200">
                <span class="inline-block h-1.5 w-1.5 rounded-full bg-cyan-400"></span>
                <span>تسجيل الدخول إلى حساب Tech Day</span>
            </div>
            <h1 class="text-2xl font-bold mt-1">تسجيل الدخول</h1>
            <p class="text-sm text-slate-400">
                استخدم البريد الإلكتروني أو اسم المستخدم مع كلمة المرور المرسلة لك على البريد.
            </p>
        </div>
        {% if error %}
        <div class="mb-4 rounded-xl border border-rose-700/70 bg-rose-500/10 px-3 py-2 text-xs text-rose-100">
            {{ error }}
        </div>
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm mb-1" for="username">البريد الإلكتروني أو اسم المستخدم</label>
                <input id="username" name="username" type="text" required
                       placeholder="example@email.com أو student_123456"
                       class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <div>
                <label class="block text-sm mb-1" for="password">كلمة المرور</label>
                <input id="password" name="password" type="password" required
                       class="w-full rounded-xl bg-slate-900 border border-slate-700 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500">
            </div>
            <button type="submit"
                    class="w-full mt-4 inline-flex items-center justify-center rounded-xl bg-cyan-500 hover:bg-cyan-400 text-slate-950 font-semibold py-2.5 text-sm transition">
                دخول
            </button>
        </form>
    </div>
</div>
{% endblock %}
